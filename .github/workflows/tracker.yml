name: March Mania Rank Tracker

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Run tracker
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: python tracker.py --no-server --no-browser

      - name: Commit and push history
        run: |
          git config user.name "tracker-bot"
          git config user.email "bot@tracker"
          git add tracker_history.json
          git diff --staged --quiet || git commit -m "Rank update $(date -u '+%H:%M UTC')"
          git push
